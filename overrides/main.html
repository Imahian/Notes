{% extends "base.html" %}

{% block scripts %}
  {{ super() }}
  <script>
  /* ── Matrix background ──────────────────────────────────────────────── */
  (function () {
    const canvas = document.createElement('canvas');
    canvas.id = 'matrix-bg';
    document.body.prepend(canvas);
    const ctx = canvas.getContext('2d');
    const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF!@#$%^&*<>/\\';
    const FS = 14, FPS = 15, MS = 1000 / FPS;
    let cols, drops, last = 0;
    function init() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      cols  = Math.floor(canvas.width / FS);
      drops = Array.from({ length: cols }, () => Math.floor(Math.random() * (canvas.height / FS)));
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    function draw(ts) {
      requestAnimationFrame(draw);
      if (ts - last < MS) return;
      last = ts;
      ctx.fillStyle = 'rgba(0,0,0,0.07)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = FS + 'px monospace';
      for (let i = 0; i < cols; i++) {
        ctx.fillStyle = Math.random() > 0.96 ? '#ffffff' : '#00cc33';
        ctx.fillText(CHARS[Math.floor(Math.random() * CHARS.length)], i * FS, drops[i] * FS);
        if (drops[i] * FS > canvas.height && Math.random() > 0.97) drops[i] = 0;
        drops[i]++;
      }
    }
    init();
    window.addEventListener('resize', init);
    requestAnimationFrame(draw);
  })();

  /* ── Visitor ticker (horizontal scrolling strip, all pages) ─────────── */
  (function () {
    function getBrowser(ua) {
      if (/Edg\//.test(ua))     return 'Edge';
      if (/OPR\//.test(ua))     return 'Opera';
      if (/Firefox\//.test(ua)) return 'Firefox';
      if (/Chrome\//.test(ua))  return 'Chrome';
      if (/Safari\//.test(ua))  return 'Safari';
      return 'Unknown';
    }
    function getOS(ua) {
      if (/Windows NT 10/.test(ua)) return 'Windows 10/11';
      if (/Windows NT/.test(ua))    return 'Windows';
      if (/Mac OS X/.test(ua))      return 'macOS';
      if (/Android/.test(ua))       return 'Android';
      if (/iPhone|iPad/.test(ua))   return 'iOS';
      if (/Linux/.test(ua))         return 'Linux';
      return 'Unknown';
    }
    function getDevice(ua) {
      return /Mobile|Android|iPhone|iPad/.test(ua) ? 'Mobile' : 'Desktop';
    }

    function buildTicker(fields) {
      const sep = '  //  ';
      const line = fields.join(sep) + sep;
      return line + line;
    }

    function inject(d) {
      if (document.getElementById('visitor-ticker')) return;
      const ua = navigator.userAgent;
      const fields = [
        d.ip               ? 'IP: '      + d.ip               : null,
        d.type             ? 'TYPE: '    + d.type             : null,
        d.country          ? 'COUNTRY: ' + d.country          : null,
        d.region           ? 'REGION: '  + d.region           : null,
        d.city             ? 'CITY: '    + d.city             : null,
        d.connection && d.connection.isp ? 'ISP: ' + d.connection.isp : null,
        d.latitude  != null ? 'LAT: '    + d.latitude         : null,
        d.longitude != null ? 'LON: '    + d.longitude        : null,
        d.timezone && d.timezone.id ? 'TZ: ' + d.timezone.id : null,
        'BROWSER: ' + getBrowser(ua),
        'OS: '      + getOS(ua),
        'DEVICE: '  + getDevice(ua),
      ].filter(Boolean);

      const text = buildTicker(fields);
      const dur  = Math.max(18, fields.length * 2.5);

      const bar = document.createElement('div');
      bar.id = 'visitor-ticker';
      bar.innerHTML =
        '<div class="vtk-label">&gt;_</div>' +
        '<div class="vtk-track"><span class="vtk-text" style="animation-duration:' + dur + 's">' +
        text + '</span></div>';
      document.body.appendChild(bar);
    }

    fetch('https://ipwho.is/')
      .then(function(r) { return r.json(); })
      .then(inject)
      .catch(function() { inject({}); });
  })();

  /* ── Terminal mobile nav ─────────────────────────────── */
  (function () {
    var MOBILE_BP = 76.1875 * 16;
    if (window.innerWidth > MOBILE_BP) return;

    var stack = [];
    var rootItems = null;
    var typeTimer = null;

    function extractNav(el) {
      if (!el) return [];
      var out = [];
      var lis = el.querySelectorAll(':scope > .md-nav__list > .md-nav__item');
      lis.forEach(function (li) {
        if (li.querySelector('.md-source')) return;
        var a   = li.querySelector(':scope > a.md-nav__link');
        var lbl = li.querySelector(':scope > label.md-nav__link');
        var sub = li.querySelector(':scope > .md-nav');
        // skip the embedded page TOC (headings), it's not navigation
        if (sub && sub.classList.contains('md-nav--secondary')) sub = null;
        var link = a || lbl;
        if (!link) return;
        var ell = link.querySelector('.md-ellipsis');
        var text = (ell ? ell.textContent : link.textContent).trim();
        if (!text || text.indexOf('imahian') >= 0) return;
        out.push({
          text: text,
          href: a ? a.href : null,
          children: sub ? extractNav(sub) : []
        });
      });
      return out;
    }

    function cdPath() {
      return ['~', 'Notes'].concat(stack.map(function (s) { return s.title; })).join('/');
    }

    function samePage(href) {
      if (!href) return false;
      try { return new URL(href).pathname === window.location.pathname; }
      catch (e) { return false; }
    }

    /* chain of dirs leading to the current page, so the menu opens "cd'd"
       into the section the visitor is already reading */
    function findPath(items) {
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        if (samePage(it.href)) {
          return it.children.length
            ? [{ title: it.text, items: it.children }]
            : [];
        }
        if (it.children.length) {
          var sub = findPath(it.children);
          if (sub !== null) {
            return [{ title: it.text, items: it.children }].concat(sub);
          }
        }
      }
      return null;
    }

    function currentStack() {
      return findPath(rootItems) || [];
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function typeText(el, text) {
      clearInterval(typeTimer);
      el.textContent = '';
      var i = 0;
      typeTimer = setInterval(function () {
        el.textContent += text[i++];
        if (i >= text.length) clearInterval(typeTimer);
      }, 16);
    }

    function render(panel) {
      var items = stack.length ? stack[stack.length - 1].items : rootItems;
      var depth = stack.length;

      var html = '<div class="tn-hdr">'
        + '<span class="tn-user">root@notes</span>'
        + '<span class="tn-col">:</span>'
        + '<span class="tn-path" id="tn-path-el"></span>'
        + '<span class="tn-ps"> $</span>'
        + ' <span class="tn-cur">&#x2588;</span>'
        + '</div>';

      if (depth > 0) {
        var dots = '';
        for (var d = 0; d < depth; d++) dots += '../';
        html += '<button class="tn-back" data-action="back">'
          + '&#x2190; cd ' + esc(dots) + '</button>';
      }

      html += '<div class="tn-cmd">$ ls</div><ul class="tn-list">';

      items.forEach(function (item, i) {
        var isDir    = item.children.length > 0;
        var isActive = !isDir && samePage(item.href);
        var delay    = (i * 0.04 + 0.02).toFixed(2) + 's';
        html += '<li class="tn-item'
          + (isDir    ? ' tn-dir'    : ' tn-file')
          + (isActive ? ' tn-active' : '')
          + '" style="animation-delay:' + delay + '">';
        if (isDir) {
          html += '<button class="tn-link" data-idx="' + i + '">'
            + '<span class="tn-pfx">&gt;</span>'
            + '<span class="tn-name">' + esc(item.text) + '/</span>'
            + '<span class="tn-arr">&#x203A;</span>'
            + '</button>';
        } else {
          html += '<a class="tn-link" href="' + esc(item.href || '#') + '">'
            + '<span class="tn-pfx">-</span>'
            + '<span class="tn-name">' + esc(item.text) + '</span>'
            + '</a>';
        }
        html += '</li>';
      });

      html += '</ul>';
      panel.innerHTML = html;

      var pathEl = document.getElementById('tn-path-el');
      if (pathEl) typeText(pathEl, cdPath());

      var back = panel.querySelector('[data-action=back]');
      if (back) {
        back.addEventListener('click', function () {
          stack.pop();
          render(panel);
        });
      }

      panel.querySelectorAll('[data-idx]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var idx  = parseInt(btn.getAttribute('data-idx'), 10);
          var item = items[idx];
          if (item && item.children.length) {
            stack.push({ title: item.text, items: item.children });
            render(panel);
          }
        });
      });
    }

    function init() {
      var sw = document.querySelector('.md-sidebar--primary .md-sidebar__scrollwrap');
      if (!sw) { setTimeout(init, 250); return; }
      if (document.getElementById('term-nav')) return;

      var primary = document.querySelector('.md-sidebar--primary .md-nav--primary');
      rootItems = extractNav(primary);
      if (!rootItems || !rootItems.length) return;

      var panel = document.createElement('div');
      panel.id = 'term-nav';
      sw.appendChild(panel);
      stack = currentStack();
      render(panel);

      var drawer = document.getElementById('__drawer');
      if (drawer) {
        drawer.addEventListener('change', function () {
          if (!this.checked) { stack = currentStack(); render(panel); }
        });
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      setTimeout(init, 150);
    }
  })();

  /* ── Desktop tab dropdowns ───────────────────────────── */
  (function () {
    function extractNav(el) {
      if (!el) return [];
      var out = [];
      var lis = el.querySelectorAll(':scope > .md-nav__list > .md-nav__item');
      lis.forEach(function (li) {
        if (li.querySelector('.md-source')) return;
        var a   = li.querySelector(':scope > a.md-nav__link');
        var lbl = li.querySelector(':scope > label.md-nav__link');
        var sub = li.querySelector(':scope > .md-nav');
        // skip the embedded page TOC (headings), it's not navigation
        if (sub && sub.classList.contains('md-nav--secondary')) sub = null;
        var link = a || lbl;
        if (!link) return;
        var ell = link.querySelector('.md-ellipsis');
        var text = (ell ? ell.textContent : link.textContent).trim();
        if (!text || text.indexOf('imahian') >= 0) return;
        out.push({
          text: text,
          href: a ? a.href : null,
          children: sub ? extractNav(sub) : []
        });
      });
      return out;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function samePage(href) {
      if (!href) return false;
      try { return new URL(href).pathname === window.location.pathname; }
      catch (e) { return false; }
    }

    function buildMenu(items) {
      var html = '<ul class="dd-menu">';
      items.forEach(function (item) {
        var kids = item.children.slice();
        var href = item.href;
        // a section's Overview page doubles as the section link
        if (!href && kids.length && kids[0].text === 'Overview') {
          href = kids[0].href;
          kids = kids.slice(1);
        }
        var isDir = kids.length > 0;
        html += '<li class="dd-item' + (isDir ? ' dd-dir' : '') + '">';
        var cls = 'dd-link' + (samePage(href) ? ' dd-active' : '');
        if (href) {
          html += '<a class="' + cls + '" href="' + esc(href) + '">'
            + '<span class="dd-pfx">' + (isDir ? '&gt;' : '-') + '</span>'
            + esc(item.text) + (isDir ? '/' : '') + '</a>';
        } else {
          html += '<span class="' + cls + '">'
            + '<span class="dd-pfx">&gt;</span>' + esc(item.text) + '/</span>';
        }
        if (isDir) html += buildMenu(kids);
        html += '</li>';
      });
      return html + '</ul>';
    }

    function init() {
      var tabs = document.querySelectorAll('.md-tabs__item');
      if (!tabs.length) { setTimeout(init, 250); return; }

      var primary = document.querySelector('.md-sidebar--primary .md-nav--primary');
      var rootItems = extractNav(primary);
      if (!rootItems.length) return;

      tabs.forEach(function (tab) {
        var link = tab.querySelector('.md-tabs__link');
        if (!link) return;
        var text = link.textContent.trim();
        var match = null;
        rootItems.forEach(function (it) {
          if (it.text === text && it.children.length) match = it;
        });
        if (!match) return;
        var kids = match.children.slice();
        if (kids.length && kids[0].text === 'Overview') kids = kids.slice(1);
        if (!kids.length) return;
        tab.classList.add('dd-host');
        tab.insertAdjacentHTML('beforeend', buildMenu(kids));
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      setTimeout(init, 150);
    }
  })();
  </script>
{% endblock %}
