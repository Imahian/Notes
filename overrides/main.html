{% extends "base.html" %}

{% block scripts %}
  {{ super() }}
  <script>
  /* ── Matrix background ──────────────────────────────────────────────── */
  (function () {
    const canvas = document.createElement('canvas');
    canvas.id = 'matrix-bg';
    document.body.prepend(canvas);
    const ctx = canvas.getContext('2d');
    const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF!@#$%^&*<>/\\';
    const FS = 14, FPS = 15, MS = 1000 / FPS;
    let cols, drops, last = 0;

    function init() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      cols  = Math.floor(canvas.width / FS);
      drops = Array.from({ length: cols }, () => Math.floor(Math.random() * (canvas.height / FS)));
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    function draw(ts) {
      requestAnimationFrame(draw);
      if (ts - last < MS) return;
      last = ts;
      ctx.fillStyle = 'rgba(0,0,0,0.07)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = FS + 'px monospace';
      for (let i = 0; i < cols; i++) {
        ctx.fillStyle = Math.random() > 0.96 ? '#ffffff' : '#00cc33';
        ctx.fillText(CHARS[Math.floor(Math.random() * CHARS.length)], i * FS, drops[i] * FS);
        if (drops[i] * FS > canvas.height && Math.random() > 0.97) drops[i] = 0;
        drops[i]++;
      }
    }
    init();
    window.addEventListener('resize', init);
    requestAnimationFrame(draw);
  })();

  /* ── Visitor terminal (fixed floating panel) ────────────────────────── */
  (function () {
    if (document.querySelector('.visitor-term')) return;

    function getBrowser(ua) {
      if (/Edg\//.test(ua))     return 'Edge';
      if (/OPR\//.test(ua))     return 'Opera';
      if (/Firefox\//.test(ua)) return 'Firefox';
      if (/Chrome\//.test(ua))  return 'Chrome';
      if (/Safari\//.test(ua))  return 'Safari';
      return 'Unknown';
    }
    function getOS(ua) {
      if (/Windows NT 10/.test(ua)) return 'Windows 10/11';
      if (/Windows NT/.test(ua))    return 'Windows';
      if (/Mac OS X/.test(ua))      return 'macOS';
      if (/Android/.test(ua))       return 'Android';
      if (/iPhone|iPad/.test(ua))   return 'iOS';
      if (/Linux/.test(ua))         return 'Linux';
      return 'Unknown';
    }
    function getDevice(ua) {
      return /Mobile|Android|iPhone|iPad/.test(ua) ? 'Mobile' : 'Desktop';
    }

    const term = document.createElement('div');
    term.className = 'visitor-term';
    term.innerHTML =
      '<div class="vt-bar"><span class="vt-dot r"></span><span class="vt-dot y"></span><span class="vt-dot g"></span></div>' +
      '<pre class="vt-pre"></pre>' +
      '<span class="vt-cursor">█</span>';
    document.body.appendChild(term);

    const pre = term.querySelector('.vt-pre');
    const ua  = navigator.userAgent;

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function buildLines(d) {
      return [
        `IP       = ${d.ip                       || 'N/A'}`,
        `TYPE     = ${d.type                     || 'N/A'}`,
        `COUNTRY  = ${d.country                  || 'N/A'}`,
        `REGION   = ${d.region                   || 'N/A'}`,
        `CITY     = ${d.city                     || 'N/A'}`,
        `ISP      = ${d.connection?.isp          || 'N/A'}`,
        `LAT      = ${d.latitude                 || 'N/A'}`,
        `LON      = ${d.longitude                || 'N/A'}`,
        `TIMEZONE = ${d.timezone?.id             || 'N/A'}`,
        ``,
        `BROWSER  = ${getBrowser(ua)}`,
        `OS       = ${getOS(ua)}`,
        `DEVICE   = ${getDevice(ua)}`,
      ];
    }

    function fallbackLines() {
      return [
        `BROWSER  = ${getBrowser(ua)}`,
        `OS       = ${getOS(ua)}`,
        `DEVICE   = ${getDevice(ua)}`,
        ``,
        `GEO      = unavailable`,
      ];
    }

    async function typeLoop(lines) {
      while (true) {
        pre.textContent = '';
        for (const line of lines) {
          for (const ch of line) {
            pre.textContent += ch;
            await sleep(12);
          }
          pre.textContent += '\n';
          await sleep(line === '' ? 50 : 28);
        }
        await sleep(4000);
      }
    }

    fetch('https://ipwho.is/')
      .then(r => r.json())
      .then(d  => typeLoop(buildLines(d)))
      .catch(()  => typeLoop(fallbackLines()));
  })();
  </script>
{% endblock %}
