site_name: "imahian // notes"
site_url: https://imahian.github.io/Notes/
site_description: "CTF writeups, cert notes, hacking tools"
site_author: imahian
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Fira Code
    code: Fira Code
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/Imahian/Notes
repo_name: Imahian/Notes

extra_css:
  - stylesheets/hacker.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - CTFs:
    - Overview: CTFs/README.md
    - HackTheBox:
      - Overview: CTFs/HTB/README.md
      - Machines:
        - Overview: CTFs/HTB/MACHINES/README.md
        - Spectra: CTFs/HTB/MACHINES/Spectra/README.md
      - Academy:
        - Overview: CTFs/HTB/ACADEMY/README.md
    - OverTheWire:
      - Overview: CTFs/OTW/README.md
      - Bandit: CTFs/OTW/Bandit/README.md
    - TryHackMe: CTFs/THM/README.md
    - VulnHub: CTFs/VHB/README.md
  - Certs:
    - Overview: Certs/README.md
    - eJPT:
      - Overview: Certs/eJPT/README.md
      - Assessment Methodologies:
        - Overview: Certs/eJPT/Assessment_Methodologies/README.md
        - Reconocimiento: Certs/eJPT/Assessment_Methodologies/Reconocimiento.md
    - eMAPT: Certs/eMAPT/README.md
    - eEDA: Certs/eEDA/README.md
    - ICCA: Certs/ICCA/README.md
    - eCIR: Certs/eCIR/README.md
    - eCPPT: Certs/eCPPT/README.md
    - eWPTX: Certs/eWPTX/README.md
    - eCDFP: Certs/eCDFP/README.md
    - eWPT: Certs/eWPT/README.md
    - eCTHP: Certs/eCTHP/README.md
  - Tools:
    - dnsdumpster: Tools/dnsdumpster.md
    - Sublist3r: Tools/Sublist3r.md
    - HTTrack: Tools/HTTrack.md
    - WHOIS: Tools/WHOIS.md
    - DNSRecon: Tools/DNSRecon-Slayer.md
    - Netcraft: Tools/Netcraft.md
    - WafW00f: Tools/WafW00f.md
