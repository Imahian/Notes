site_name: "imahian // notes"
site_url: https://imahian.github.io/Notes/
site_description: "CTF writeups, cert notes, hacking tools, CVEs"
site_author: imahian
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  logo: assets/oroborus.gif
  favicon: assets/oroborus.gif
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Fira Code
    code: Fira Code
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - tags
  icon:
    repo: fontawesome/brands/github
    tag:
      ssh: fontawesome/solid/terminal
      web: fontawesome/solid/globe
      privesc: fontawesome/solid/arrow-up
      easy: fontawesome/solid/circle
      medium: fontawesome/solid/circle-half-stroke
      hard: fontawesome/solid/circle-dot
      htb: fontawesome/solid/cube
      thm: fontawesome/solid/flag
      otw: fontawesome/solid/scroll
      cve: fontawesome/solid/bug

repo_url: https://github.com/Imahian/Notes
repo_name: Imahian/Notes

extra_css:
  - stylesheets/hacker3.css

plugins:
  - search:
      prebuild_index: true
  - tags:
      tags_file: tags.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - CTFs:
